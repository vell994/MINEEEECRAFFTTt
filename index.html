<script>
  // Функция, которая добавляет иконку перед текстом ссылки
  function addIconToLink(linkId, iconClass) {
    // Находим ссылку по id (СЮДА ВСТАВЬ id СВОЕЙ ССЫЛКИ)
    const link = document.getElementById(linkId);
    if (!link) return; // Если ссылка не найдена — выходим

    // Создаём элемент для иконки
    const icon = document.createElement('span');
    icon.className = iconClass; // Присваиваем класс с иконкой (СЮДА МОЖНО ДОБАВИТЬ СВОЙ КЛАСС)

    // Вставляем иконку перед текстом ссылки
    link.insertBefore(icon, link.firstChild);
  }

  // Вызываем функцию для нашей ссылки
  // Первый параметр — id ссылки, второй — класс иконки
  addIconToLink('myLink', 'link-icon');
</script>

    <!-- Подключаем jQuery и Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let currentColor = '#000'; // Текущий активный цвет
        let ctx = null; // Контекст canvas'а

        window.onload = () => {
            // Инициализация контекста canvas'а
            const canvas = document.querySelector('#pixel-canvas');
            ctx = canvas.getContext('2d');

            // Рисуем сетку квадратов
            drawGrid();

            // Устанавливаем слушатель события click для рисования
            canvas.addEventListener('click', e => {
                const rect = canvas.getBoundingClientRect(); // Определяем координаты клика относительно canvas'а
                const x = Math.floor((e.clientX - rect.left) / 10); // Каждое деление сетки имеет ширину 10px
                const y = Math.floor((e.clientY - rect.top) / 10);

                fillPixel(x, y, currentColor); // Заполняем соответствующий пиксель заданным цветом
            });
        };

        // Функция рисования сетки
        function drawGrid() {
            const size = 50; // Размер сетки (50х50)
            const cellSize = 10; // Ширина каждого квадрата
            ctx.clearRect(0, 0, 500, 500); // Очищаем canvas
            for(let i = 0; i <= size; i++) {
                ctx.beginPath();
                ctx.moveTo(i*cellSize, 0);
                ctx.lineTo(i*cellSize, size*cellSize);
                ctx.strokeStyle = "#ccc";
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i*cellSize);
                ctx.lineTo(size*cellSize, i*cellSize);
                ctx.stroke();
            }
        }

        // Функция заполнения пикселя цветом
        function fillPixel(x, y, color) {
            if (ctx && x >= 0 && y >= 0 && x < 50 && y < 50) { // Проверяем пределы
                ctx.fillStyle = color;
                ctx.fillRect(x*10, y*10, 10, 10); // Закрашиваем прямоугольник размером 10x10 px
            }
        }

        // Сохранение изображения на сервер
        async function saveImage() {
            try {
                const dataURL = canvas.toDataURL('image/png'); // Преобразовываем canvas в base64 картинку
                await fetch('/api/save-image', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ image: dataURL })
                });
                alert('Изображение успешно сохранено!');
            } catch(e) {
                alert('Ошибка сохранения изображения.');
            }
        }

        // Экспортируем файл
        function exportFile() {
            const format = document.getElementById('file-format').value;
            const dataURL = canvas.toDataURL(`image/${format}`); // Генерируем нужную ссылку на файл
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = `mypixelart.${format}`;
            link.click();
        }
        
    </script>
    <script>
    function checkQuiz() {
        // Массив правильных ответов
        const answers = ["red", "ussr", "doestoevsky"];

        // Собираем выбранные пользователем ответы
        const selectedValues = [];
        const selects = document.querySelectorAll('.questions-list select');
        selects.forEach(select => {
            selectedValues.push(select.value);
        });

        // Подсчет верных ответов
        let correctCount = 0;
        for(let i = 0; i < answers.length; i++) {
            if(selectedValues[i] === answers[i]) {
                correctCount++;
            }
        }

        // Сообщаем пользователю количество правильных ответов
        document.getElementById('results').innerHTML =
            '<p>Верно ответил на ' + correctCount + ' из ' + answers.length + ' вопросов.</p>';
    }
</script>
